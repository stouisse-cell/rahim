<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Rahim International</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="../logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="admin-brand">Rahim <span>International</span></div>
    <div class="admin-sub">Admin</div>
    <nav class="admin-nav">
      <a href="index.html" class="active">Dashboard</a>
      <a href="leads.html">Leads</a>
      <a href="properties.html">Properties</a>
    </nav>
    <div class="admin-foot">
      <a href="/" target="_blank">View site →</a><br>
      <a href="#" data-logout>Sign out</a>
    </div>
  </aside>
  <main class="admin-main">
    <div class="admin-header">
      <h1>Dashboard</h1>
    </div>

    <div class="stats" id="stats">
      <div class="stat"><div class="label">Total leads</div><div class="value" id="s-total">—</div></div>
      <div class="stat"><div class="label">Last 7 days</div><div class="value" id="s-7">—</div></div>
      <div class="stat"><div class="label">Last 30 days</div><div class="value" id="s-30">—</div></div>
      <div class="stat"><div class="label">Properties</div><div class="value" id="s-props">—</div></div>
    </div>

    <div class="card">
      <h2>Leads by status</h2>
      <div id="status-bars"></div>
    </div>

    <div class="card">
      <h2>Leads by language</h2>
      <div id="lang-bars"></div>
    </div>

    <div class="card">
      <h2>Latest leads</h2>
      <table class="data" id="recent-leads">
        <thead><tr><th>When</th><th>Name</th><th>Email</th><th>Page</th><th>Status</th></tr></thead>
        <tbody><tr><td colspan="5" style="color:var(--muted);">Loading…</td></tr></tbody>
      </table>
      <div style="margin-top:1rem;"><a href="leads.html">All leads →</a></div>
    </div>
  </main>
</div>
<script src="admin.js"></script>
<script>
  (async function () {
    try {
      const [stats, leads, props] = await Promise.all([
        AdminAPI.get('/api/admin/leads/stats'),
        AdminAPI.get('/api/admin/leads'),
        AdminAPI.get('/api/admin/properties'),
      ]);
      document.getElementById('s-total').textContent = stats.total;
      document.getElementById('s-7').textContent = stats.last7;
      document.getElementById('s-30').textContent = stats.last30;
      document.getElementById('s-props').textContent = props.length;

      const sb = document.getElementById('status-bars');
      const max1 = Math.max(1, ...stats.byStatus.map((x) => x.count));
      sb.innerHTML = stats.byStatus.map((row) => `
        <div style="display:grid;grid-template-columns:120px 1fr 60px;align-items:center;gap:.8rem;margin:.4rem 0;">
          <span class="pill ${row.status}">${row.status}</span>
          <div style="background:#eee;height:10px;border-radius:5px;overflow:hidden;">
            <div style="background:var(--copper);height:100%;width:${(row.count / max1 * 100).toFixed(1)}%;"></div>
          </div>
          <span class="num" style="text-align:right;font-variant-numeric:tabular-nums;">${row.count}</span>
        </div>
      `).join('') || '<p style="color:var(--muted);">No leads yet.</p>';

      const lb = document.getElementById('lang-bars');
      const max2 = Math.max(1, ...stats.byLang.map((x) => x.count));
      lb.innerHTML = stats.byLang.map((row) => `
        <div style="display:grid;grid-template-columns:120px 1fr 60px;align-items:center;gap:.8rem;margin:.4rem 0;">
          <span style="font-weight:500;">${row.lang || '(none)'}</span>
          <div style="background:#eee;height:10px;border-radius:5px;overflow:hidden;">
            <div style="background:var(--gold);height:100%;width:${(row.count / max2 * 100).toFixed(1)}%;"></div>
          </div>
          <span class="num" style="text-align:right;font-variant-numeric:tabular-nums;">${row.count}</span>
        </div>
      `).join('') || '<p style="color:var(--muted);">No leads yet.</p>';

      const recent = leads.slice(0, 8);
      const tbody = document.querySelector('#recent-leads tbody');
      if (!recent.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:var(--muted);">No leads yet.</td></tr>';
      } else {
        tbody.innerHTML = recent.map((L) => `
          <tr>
            <td style="white-space:nowrap;color:var(--muted);">${fmtDate(L.createdAt)}</td>
            <td><a href="leads.html#lead-${L.id}">${escapeHtml(L.name)}</a></td>
            <td><a href="mailto:${escapeAttr(L.email)}">${escapeHtml(L.email)}</a></td>
            <td style="color:var(--muted);">${escapeHtml(L.sourcePage || '')} ${L.sourceLang ? `(${L.sourceLang})` : ''}</td>
            <td><span class="pill ${L.status}">${L.status}</span></td>
          </tr>
        `).join('');
      }
    } catch (err) {
      if (err.message !== 'unauthorized') toast('Could not load dashboard data', 'error');
    }
  })();

  function escapeHtml(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }
</script>
</body>
</html>
