<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin sign in | Rahim International</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="../logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<main class="login-shell">
  <form class="login-card" id="login-form">
    <h1>Admin <em style="font-style:italic;color:var(--copper);">sign in</em></h1>
    <p class="muted">Restricted area for Rahim International administrators only.</p>
    <input type="text" name="username" autocomplete="username" value="admin" hidden aria-hidden="true">
    <label class="field">
      <span>Password</span>
      <input type="password" id="pw" name="password" autocomplete="current-password" autofocus required>
    </label>
    <button type="submit" class="btn copper" id="submit" style="width:100%;padding:.8rem;">Sign in</button>
    <p class="error-msg" id="err"></p>
  </form>
</main>
<script>
  (async function() {
    try {
      const r = await fetch('/api/admin/me', { credentials: 'same-origin' });
      const data = await r.json();
      if (data.isAdmin) window.location.replace('/admin/');
    } catch {}
  })();

  const form = document.getElementById('login-form');
  const pw = document.getElementById('pw');
  const err = document.getElementById('err');
  const btn = document.getElementById('submit');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.textContent = '';
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = 'Signing in…';
    try {
      const r = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ password: pw.value }),
      });
      if (!r.ok) {
        const data = await r.json().catch(() => ({}));
        err.textContent = data.error || 'Sign in failed';
        return;
      }
      window.location.replace('/admin/');
    } catch {
      err.textContent = 'Network error. Please try again.';
    } finally {
      btn.disabled = false;
      btn.textContent = original;
    }
  });
</script>
</body>
</html>
